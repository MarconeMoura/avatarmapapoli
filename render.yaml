services:
  - type: web
    name: mapa-poli
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn avatar:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: OPENAI_TTS_VOICE
        value: nova
